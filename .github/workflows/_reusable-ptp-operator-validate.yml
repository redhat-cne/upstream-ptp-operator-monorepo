name: "Reusable: ptp-operator Validate"
on:
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.23.x]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Dependencies
        run: go mod tidy && go mod vendor

      - name: Run vet
        run: make vet

      - name: Run fmt
        run: make fmt

      - name: Bundle check
        run: |
          if make -n bundle-check >/dev/null 2>&1; then
            make bundle-check
          else
            echo "Skipping: bundle-check target not available in this branch"
          fi
